<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Camera Setup</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: monospace;
            background: #0d0d0d;
            color: #e0e0e0;
            padding: 40px 16px 80px;
        }

        h1 {
            font-size: 2rem;
            text-align: center;
            color: #00e5ff;
            margin-bottom: 6px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 36px;
        }

        /* ── Section wrapper ── */
        .section {
            max-width: 960px;
            margin: 0 auto 28px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 24px;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #00e5ff;
            letter-spacing: 0.08em;
            margin-bottom: 18px;
        }

        /* ── Camera picker ── */
        #camera-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            max-width: 960px;
            margin: 0 auto 28px;
        }

        .cam-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 14px 18px;
            cursor: pointer;
            min-width: 180px;
        }

        .cam-card:hover {
            border-color: #00e5ff;
        }

        .cam-card.selected {
            border-color: #00e5ff;
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
        }

        .cam-card h3 {
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        .cam-card .meta {
            font-size: 0.72rem;
            color: #888;
        }

        /* ── Field grid ── */
        .field-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 16px;
        }

        .field label {
            display: block;
            font-size: 0.68rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 5px;
        }

        .field input[type=text],
        .field input[type=number],
        .field select {
            width: 100%;
            padding: 7px 10px;
            background: #111;
            border: 1px solid #333;
            border-radius: 5px;
            color: #e0e0e0;
            font-family: monospace;
            font-size: 0.82rem;
        }

        .field input:focus,
        .field select:focus {
            outline: none;
            border-color: #00e5ff;
        }

        .info-value {
            font-size: 0.85rem;
            color: #00e5ff;
            padding: 7px 0;
        }

        /* toggle */
        .toggle-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding-top: 4px;
        }

        .toggle {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }

        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            inset: 0;
            background: #333;
            border-radius: 22px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-slider::before {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            left: 3px;
            top: 3px;
            background: #888;
            border-radius: 50%;
            transition: transform 0.2s, background 0.2s;
        }

        .toggle input:checked+.toggle-slider {
            background: #00e5ff22;
        }

        .toggle input:checked+.toggle-slider::before {
            transform: translateX(18px);
            background: #00e5ff;
        }

        .toggle-label {
            font-size: 0.82rem;
            color: #aaa;
        }

        /* slider */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .slider-row input[type=range] {
            flex: 1;
            accent-color: #00e5ff;
        }

        .slider-row span {
            font-size: 0.8rem;
            color: #00e5ff;
            min-width: 40px;
            text-align: right;
        }

        /* live preview */
        #live-section {
            display: none;
            text-align: center;
            max-width: 960px;
            margin: 0 auto 28px;
        }

        #live-section h2 {
            color: #00e5ff;
            margin-bottom: 12px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        #live-preview {
            max-width: 100%;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
        }

        /* camera list sidebar feel */
        #cam-list-label {
            max-width: 960px;
            margin: 0 auto 10px;
            font-size: 0.72rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* configured cameras pill list */
        #configured-list {
            max-width: 960px;
            margin: 0 auto 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .cfg-pill {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 99px;
            padding: 4px 14px;
            font-size: 0.75rem;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .cfg-pill.done {
            border-color: #22d3a5;
            color: #22d3a5;
        }

        .cfg-pill .remove-btn {
            cursor: pointer;
            color: #555;
            font-size: 0.9rem;
            line-height: 1;
        }

        .cfg-pill .remove-btn:hover {
            color: #f43f5e;
        }

        /* action bar */
        #action-bar {
            max-width: 960px;
            margin: 0 auto;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        button {
            font-family: monospace;
            font-size: 0.82rem;
            padding: 9px 20px;
            border-radius: 6px;
            border: 1px solid #333;
            background: transparent;
            color: #888;
            cursor: pointer;
        }

        button:hover {
            color: #e0e0e0;
            border-color: #555;
        }

        button.primary {
            background: #00e5ff;
            color: #000;
            font-weight: bold;
            border-color: transparent;
        }

        button.primary:hover {
            background: #33ecff;
        }

        button.primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        button.danger {
            border-color: #f43f5e44;
            color: #f43f5e88;
        }

        button.danger:hover {
            border-color: #f43f5e;
            color: #f43f5e;
        }

        .empty {
            color: #555;
            padding: 16px 0;
            font-size: 0.85rem;
        }

        hr {
            border: none;
            border-top: 1px solid #222;
            margin: 20px 0;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1a;
            border: 1px solid #22d3a5;
            color: #22d3a5;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 0.8rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
        }

        #toast.error {
            border-color: #f43f5e;
            color: #f43f5e;
        }
    </style>
</head>

<body>

    <h1>Camera Setup</h1>
    <p class="subtitle">Configure cameras, then save</p>

    <div id="cam-list-label">Detected cameras - click to configure</div>
    <div id="camera-grid">
        <div class="empty">Scanning...</div>
    </div>

    <div class="section" id="cam-config-section" style="display:none">
        <div class="section-title" id="cam-config-title">Camera Settings</div>

        <div class="field-grid" style="margin-bottom:16px">
            <div class="field" style="grid-column:1/-1">
                <label>Camera Name (used as key in config)</label>
                <input type="text" id="f-name" placeholder="e.g. Arducam" />
            </div>
        </div>

        <hr>

        <div id="live-section">
            <h2>Live Preview</h2>
            <img id="live-preview" src="" alt="Camera feed" />
        </div>

        <div class="section-title" style="margin-top:16px">Image Settings</div>
        <div class="field-grid" style="margin-bottom:16px">
            <div class="field">
                <label>Resolution</label>
                <div class="info-value" id="f-resolution">—</div>
            </div>
            <div class="field">
                <label>Brightness</label>
                <div class="slider-row">
                    <input type="range" id="s-brightness" min="-50" max="50" value="0"
                        oninput="document.getElementById('v-brightness').textContent=this.value; updateSetting('brightness',this.value)" />
                    <span id="v-brightness">0</span>
                </div>
            </div>
            <div class="field">
                <label>Contrast</label>
                <div class="slider-row">
                    <input type="range" id="s-contrast" min="0" max="100" value="0"
                        oninput="document.getElementById('v-contrast').textContent=this.value; updateSetting('contrast',this.value)" />
                    <span id="v-contrast">0</span>
                </div>
            </div>
            <div class="field">
                <label>Exposure</label>
                <div class="slider-row">
                    <input type="range" id="s-exposure" min="-10" max="10" value="0"
                        oninput="document.getElementById('v-exposure').textContent=this.value; updateSetting('exposure',this.value)" />
                    <span id="v-exposure">0</span>
                </div>
            </div>
        </div>

        <hr>

        <div class="section-title">Position &amp; Orientation</div>
        <div class="field-grid" style="margin-bottom:16px">
            <div class="field"><label>X (Inches)</label><input type="number" id="f-x" value="0" step="0.01" /></div>
            <div class="field"><label>Y (Inches)</label><input type="number" id="f-y" value="0" step="0.01" /></div>
            <div class="field"><label>Height (Inches)</label><input type="number" id="f-height" value="0" step="0.01" />
            </div>
            <div class="field"><label>Pitch (degrees)</label><input type="number" id="f-pitch" value="0" step="0.1" />
            </div>
            <div class="field"><label>Yaw (degrees)</label><input type="number" id="f-yaw" value="0" step="0.1" /></div>
            <div class="field">
                <label>Subsystem</label>
                <input type="text" id="f-subsystem" placeholder="e.g. field, arm, intake" />
            </div>
        </div>

        <hr>

        <div class="section-title">Capture Settings</div>
        <div class="field-grid" style="margin-bottom:16px">
            <div class="field"><label>FPS Cap</label><input type="number" id="f-fps-cap" value="30" min="1" max="120" />
            </div>
            <div class="field">
                <label>Source override (leave blank to use index)</label>
                <input type="text" id="f-source" placeholder="e.g. /dev/video0" />
            </div>
            <div class="field">
                <label>Grayscale</label>
                <div class="toggle-row">
                    <label class="toggle">
                        <input type="checkbox" id="f-grayscale" />
                        <span class="toggle-slider"></span>
                    </label>
                    <span class="toggle-label">Convert frames to grayscale</span>
                </div>
            </div>
        </div>

        <hr>

        <div style="display:flex; gap:10px; justify-content:flex-end">
            <button onclick="cancelCam()">Cancel</button>
            <button class="primary" onclick="addCamera()">Add Camera</button>
        </div>
    </div>

    <div id="cam-list-label2"
        style="max-width:960px;margin:0 auto 10px;font-size:0.72rem;color:#555;text-transform:uppercase;letter-spacing:0.06em;display:none">
        Configured cameras
    </div>
    <div id="configured-list"></div>

    <div id="action-bar">
        <button onclick="loadCameras()">Rescan cameras</button>
        <button class="primary" id="save-btn" disabled onclick="saveAll()">Save config.json</button>
    </div>

    <div id="toast"></div>

    <script>
        let cameras = []; 
        let selectedCamIndex = null;
        let configuredCameras = []; // list of fully filled-in camera objects

        async function loadCameras() {
            document.getElementById('camera-grid').innerHTML = '<div class="empty">Scanning...</div>';
            try {
                const r = await fetch('/api/cameras');
                cameras = await r.json();
                renderGrid();
            } catch (e) {
                document.getElementById('camera-grid').innerHTML =
                    '<div class="empty">Could not reach server.</div>';
            }
        }

        function renderGrid() {
            const grid = document.getElementById('camera-grid');
            if (!cameras.length) {
                grid.innerHTML = '<div class="empty">No cameras found. Plug one in and rescan.</div>';
                return;
            }
            grid.innerHTML = '';
            cameras.forEach(cam => {
                const card = document.createElement('div');
                card.className = 'cam-card';
                card.dataset.index = cam.index;
                const alreadyAdded = configuredCameras.some(c => c.index === cam.index);
                card.innerHTML = `
                <h3>${cam.name}</h3>
                <div class="meta">${cam.width}x${cam.height}${alreadyAdded ? ' Added' : ''}</div>`;
                card.addEventListener('click', () => openCamConfig(cam));
                grid.appendChild(card);
            });
        }

        function openCamConfig(cam) {
            selectedCamIndex = cam.index;

            // Pre-fill from existing configured entry if editing
            const existing = configuredCameras.find(c => c.index === cam.index);

            document.getElementById('cam-config-title').textContent =
                `Configure - ${cam.name} (${cam.width}x${cam.height})`;
            document.getElementById('cam-config-section').style.display = 'block';

            document.getElementById('f-name').value = existing?.name ?? cam.name;
            document.getElementById('f-resolution').textContent = `${cam.width}x${cam.height}`;
            document.getElementById('f-x').value = existing?.x ?? 0;
            document.getElementById('f-y').value = existing?.y ?? 0;
            document.getElementById('f-height').value = existing?.height ?? 0;
            document.getElementById('f-pitch').value = existing?.pitch ?? 0;
            document.getElementById('f-yaw').value = existing?.yaw ?? 0;
            document.getElementById('f-fps-cap').value = existing?.fps_cap ?? 30;
            document.getElementById('f-source').value = existing?.source ?? '';
            document.getElementById('f-grayscale').checked = existing?.grayscale ?? false;
            document.getElementById('f-subsystem').value = existing?.subsystem ?? 'field';

            // Sliders
            const b = existing?.brightness ?? cam.brightness;
            const c = existing?.contrast ?? cam.contrast;
            const e = existing?.exposure ?? cam.exposure;
            setSlider('brightness', b);
            setSlider('contrast', c);
            setSlider('exposure', e);

            // Live preview
            document.getElementById('live-section').style.display = 'block';
            document.getElementById('live-preview').src =
                `/video_feed?index=${cam.index}&t=${Date.now()}`;

            // Scroll to form
            document.getElementById('cam-config-section').scrollIntoView({ behavior: 'smooth' });
        }

        function setSlider(key, value) {
            const input = document.getElementById(`s-${key}`);
            const span = document.getElementById(`v-${key}`);
            if (input) { input.value = value; }
            if (span) { span.textContent = value; }
        }

        async function updateSetting(key, value) {
            if (selectedCamIndex === null) return;
            await fetch('/api/update_setting', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ index: selectedCamIndex, [key]: parseFloat(value) })
            });
        }

        function addCamera() {
            const name = document.getElementById('f-name').value.trim();
            if (!name) { showToast('Give this camera a name first', true); return; }

            const sourceRaw = document.getElementById('f-source').value.trim();
            const cam = cameras.find(c => c.index === selectedCamIndex);

            const entry = {
                index: selectedCamIndex,
                name,
                x: parseFloat(document.getElementById('f-x').value) || 0,
                y: parseFloat(document.getElementById('f-y').value) || 0,
                height: parseFloat(document.getElementById('f-height').value) || 0,
                pitch: parseFloat(document.getElementById('f-pitch').value) || 0,
                yaw: parseFloat(document.getElementById('f-yaw').value) || 0,
                grayscale: document.getElementById('f-grayscale').checked,
                fps_cap: parseInt(document.getElementById('f-fps-cap').value) || 30,
                source: sourceRaw || selectedCamIndex,
                subsystem: document.getElementById('f-subsystem').value,
                brightness: parseFloat(document.getElementById('s-brightness').value),
                contrast: parseFloat(document.getElementById('s-contrast').value),
                exposure: parseFloat(document.getElementById('s-exposure').value)
            };

            // Replace if already exists
            const existingIdx = configuredCameras.findIndex(c => c.index === selectedCamIndex);
            if (existingIdx >= 0) configuredCameras[existingIdx] = entry;
            else configuredCameras.push(entry);

            closeCamConfig();
            renderConfiguredList();
            renderGrid(); // refresh checkmarks
            showToast(`"${name}" added`);
        }

        function cancelCam() {
            closeCamConfig();
        }

        function closeCamConfig() {
            document.getElementById('cam-config-section').style.display = 'none';
            document.getElementById('live-section').style.display = 'none';
            document.getElementById('live-preview').src = '';
            selectedCamIndex = null;
        }

        function renderConfiguredList() {
            const list = document.getElementById('configured-list');
            const label = document.getElementById('cam-list-label2');
            const saveBtn = document.getElementById('save-btn');

            if (!configuredCameras.length) {
                list.innerHTML = '';
                label.style.display = 'none';
                saveBtn.disabled = true;
                return;
            }

            label.style.display = 'block';
            saveBtn.disabled = false;

            list.innerHTML = '';
            configuredCameras.forEach(cam => {
                const pill = document.createElement('div');
                pill.className = 'cfg-pill done';
                pill.innerHTML = `
                ${cam.name} (index ${cam.index})
                <span class="remove-btn" onclick="removeCam(${cam.index})">X</span>`;
                list.appendChild(pill);
            });
        }

        function removeCam(index) {
            configuredCameras = configuredCameras.filter(c => c.index !== index);
            renderConfiguredList();
            renderGrid();
        }

        async function saveAll() {
            if (!configuredCameras.length) {
                showToast('Add at least one camera first', true);
                return;
            }

            const btn = document.getElementById('save-btn');
            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                const r = await fetch('/api/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ cameras: configuredCameras})
                });
                const data = await r.json();
                if (data.ok) {
                    showToast('config.json saved!');
                    btn.textContent = 'Saved';
                    // setTimeout(() => fetch('/api/shutdown', { method: 'POST' }), 1500);
                } else {
                    showToast('Save failed', true);
                    btn.disabled = false;
                    btn.textContent = 'Save config.json';
                }
            } catch (e) {
                showToast('Network error', true);
                btn.disabled = false;
                btn.textContent = 'Save config.json';
            }
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'show' + (isError ? ' error' : '');
            clearTimeout(t._timer);
            t._timer = setTimeout(() => t.className = '', 3000);
        }

        loadCameras();
    </script>
</body>

</html>
